sonar.projectKey=hackathom-fiap_fiapx-app-api
sonar.organization=hackathom-fiap
sonar.host.url=https://sonarcloud.io

# Onde está o código e os binários
sonar.sources=src/main/java
sonar.java.binaries=target/classes

# Configurações de encoding e linguagem
sonar.sourceEncoding=UTF-8
sonar.language=java

# Relatório de cobertura do JaCoCo (gerado pelo Maven)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Define a branch principal
sonar.branch.name=main
