spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  jpa:
    hibernate:
      ddl-auto: update
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5671}
    username: ${RABBIT_USER:appuser}
    password: ${RABBIT_PASSWORD:admin123}
    ssl:
      enabled: true

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET:hackathon-secret-key-fiap-x-soat11-java}
